# NextDNS Domain Analytics Connector (companion to nextdns-blocked)
# Polls aggregated domain query statistics for behavioral baseline detection.
# Writes BehaviorPattern nodes for high-frequency domain queries (potential
# beacon/exfil indicators).
#
# Activate separately: agency hub activate nextdns-analytics

kind: connector
name: nextdns-analytics
version: 0.1.0
description: >
  NextDNS domain analytics connector. Polls aggregated query counts per
  domain every 30 minutes and writes BehaviorPattern nodes for domains
  with anomalously high query volumes (>= 50 queries in the window).
  Companion to the nextdns-blocked connector.
author: agency-hub
license: MIT

requires:
  credentials:
    - name: NEXTDNS_API_KEY
      description: NextDNS API key (from account settings page)
      type: secret
      scope: service-grant
      grant_name: nextdns-api
      setup_url: "https://my.nextdns.io/account"
    - name: NEXTDNS_PROFILE_ID
      description: NextDNS profile ID (visible in dashboard URL)
      type: config
      scope: env-var
      example: "abc123"
  egress_domains:
    - api.nextdns.io
  services:
    - nextdns-api

source:
  type: poll
  url: "https://api.nextdns.io/profiles/${NEXTDNS_PROFILE_ID}/analytics/domains?from=-30m&limit=100"
  method: GET
  headers:
    X-Api-Key: "${NEXTDNS_API_KEY}"
  interval: 30m
  response_key: "$.data"

# --- Knowledge graph writes ---
# Write BehaviorPattern nodes for domains with >= 50 queries in the 30m window.
# This is a potential beacon or exfiltration indicator.
#
# Known limitation: the match filter uses regex against the numeric queries
# field. The router converts the value to str() before matching, so regex
# on the string representation of an integer works for >= 50:
#   "50" matches ^[5-9][0-9]  (50-99)
#   "100" matches ^[1-9][0-9]{2,}  (100+)
# Single-digit and teens (0-49) won't match — which is the desired behavior.
#
# If this regex approach proves unreliable, remove the match block and write
# all domains. The curator's anomaly detection will surface spikes anyway.

graph_ingest:
  - match:
      queries: "re:^[5-9][0-9]$|^[1-9][0-9]{2,}$"
    nodes:
      - kind: BehaviorPattern
        label: "dns-spike:{{payload.domain}}"
        properties:
          pattern_type: "dns_query_spike"
          domain: "{{payload.domain}}"
          query_count: "{{payload.queries}}"
          blocked_count: "{{payload.blocked}}"
          window: "30m"
          source: "nextdns"

# No routes — analytics is graph-only. Agents query the graph for
# behavioral context, they don't get woken per analytics poll.

rate_limits:
  max_per_hour: 10
  max_concurrent: 1
