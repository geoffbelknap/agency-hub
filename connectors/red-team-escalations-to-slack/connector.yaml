kind: connector
name: red-team-escalations-to-slack
version: "1.0.0"
description: >
  Routes red-team-escalations channel messages to a Slack channel in real-time.
  Agents post to #red-team-escalations when they encounter suspicious messages,
  require human approval before destructive actions, or flag scope anomalies.
  This connector surfaces those escalations so the operator sees them immediately.

  Set SLACK_ESCALATION_CHANNEL_ID to the Slack channel where escalations should
  appear (e.g. a private #red-team-alerts channel).

  Activate after deploying the red-team pack:
    agency connector activate red-team-escalations-to-slack

author: Agency

requires:
  services:
    - slack

source:
  type: channel-watch
  channel: red-team-escalations
  pattern: ".*"

routes:
  - match: {}
    relay:
      url: "https://slack.com/api/chat.postMessage"
      method: POST
      headers:
        Authorization: "Bearer ${SLACK_BOT_TOKEN}"
        Content-Type: application/json
      body: >
        {"channel": "${SLACK_ESCALATION_CHANNEL_ID}",
         "text": ":rotating_light: *[red-team escalation]* *{{ sender }}*: {{ content }}",
         "unfurl_links": false}

rate_limits:
  max_per_hour: 100
  max_concurrent: 5
