kind: connector
name: comms-to-slack
version: "1.0.0"
description: >
  Mirrors agency comms channel messages to a Slack channel in real-time.
  Uses a relay target — no agent is spawned, messages are forwarded
  directly. Useful for visibility into agent collaboration from Slack.

  Set AGENCY_CHANNEL to the agency comms channel to watch and
  SLACK_CHANNEL_ID to the Slack channel to post into.

  Modes:
    - Mirror all messages: set pattern to ".*"
    - Quiet mode: set pattern to match only priority keywords or
      disable the connector to suppress Slack noise entirely.
author: Geoff Belknap
license: Apache-2.0

requires:
  services:
    - slack

source:
  type: channel-watch
  channel: general
  pattern: ".*"

routes:
  - match: {}
    relay:
      url: "https://slack.com/api/chat.postMessage"
      method: POST
      headers:
        Authorization: "Bearer ${SLACK_BOT_TOKEN}"
        Content-Type: application/json
      body: >
        {"channel": "${SLACK_CHANNEL_ID}",
         "text": "*[{{ channel }}]* *{{ author }}*: {{ content }}",
         "unfurl_links": false}

rate_limits:
  max_per_hour: 500
  max_concurrent: 10
