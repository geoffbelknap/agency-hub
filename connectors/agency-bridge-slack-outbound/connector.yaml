kind: connector
name: agency-bridge-slack-outbound
version: "0.1.0"
description: >
  Relays comms messages created in response to Slack-originated work back into
  the originating Slack conversation. Uses preserved connector metadata to
  post into the correct Slack channel and thread.
author: geoffbelknap
license: Apache-2.0

requires:
  services:
    - slack

source:
  type: channel-watch
  channel: "${AGENCY_BRIDGE_SLACK_CHANNEL}"
  pattern: ".*"

routes:
  - match: {}
    relay:
      url: "https://slack.com/api/chat.postMessage"
      method: POST
      headers:
        Authorization: "Bearer ${SLACK_BOT_TOKEN}"
        Content-Type: application/json
      body: >
        {"channel": "{{ metadata.source_payload.event.channel }}",
         "text": "*{{ author }}*: {{ content }}",
         "thread_ts": "{{ metadata.source_payload.event.thread_ts or metadata.source_payload.event.ts }}",
         "unfurl_links": false}

rate_limits:
  max_per_hour: 1000
  max_concurrent: 20
