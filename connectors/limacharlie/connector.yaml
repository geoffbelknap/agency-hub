# LimaCharlie Detections Connector
# Polls LC Insight detection API for security alerts. Writes Alert and Device
# nodes to the knowledge graph. Routes high-severity alerts to triage mission.
#
# Install:  agency hub install limacharlie --kind connector
# Activate: agency connector activate limacharlie
#
# Credentials:
#   agency grant --global limacharlie-api --key-env LC_API_KEY
#   Set LC_ORG_ID in ~/.agency/.env
#
# Auth: JWT exchange handled by egress proxy (jwt-swap.yaml config).
# No Authorization header needed — egress injects Bearer JWT automatically.

kind: connector
name: limacharlie
version: 0.3.0
description: >
  LimaCharlie endpoint security connector. Polls the Insight detections
  API for security alerts. Writes Alert and Device nodes to the knowledge
  graph. Routes high and critical alerts to the triage mission.
author: agency-hub
license: MIT

requires:
  credentials:
    - name: LC_API_KEY
      description: LimaCharlie API key (insight.det.get, sensor.get scopes)
      type: secret
      scope: service-grant
      grant_name: limacharlie-api
      setup_url: "https://app.limacharlie.io/api-keys"
    - name: LC_ORG_ID
      description: LimaCharlie organization ID
      type: config
      scope: env-var
      example: "263c19e9-bd4a-475a-8cd3-5403af446cb9"
  auth:
    type: jwt-exchange
    token_url: "https://jwt.limacharlie.io"
    token_params:
      oid: "${LC_ORG_ID}"
      secret: "${credential}"
    token_response_field: "jwt"
    token_ttl_seconds: 3000
  egress_domains:
    - api.limacharlie.io
    - jwt.limacharlie.io
  services:
    - limacharlie-api

source:
  type: poll
  url: "https://api.limacharlie.io/v1/insight/${LC_ORG_ID}/detections?start={_poll_start}&end={_poll_end}"
  method: GET
  # No Authorization header — egress JWT swap handles auth for api.limacharlie.io
  interval: 2m
  response_key: "$.detects"
  dedup_key: "detect_id"

# --- Knowledge graph writes ---
# Severity is in detect_mtd.level (string: info/low/medium/high/critical).
# Only medium+ written to graph.
# Templates use {{payload.field}} — graph_ingest sandboxed Jinja2.

graph_ingest:
  - match:
      detect_mtd.level: [medium, high, critical]
    nodes:
      - kind: Alert
        label: "{{payload.detect_id}}"
        properties:
          category: "{{payload.cat}}"
          severity: "{{payload.detect_mtd.level}}"
          description: "{{payload.detect_mtd.description}}"
          hostname: "{{payload.detect.routing.hostname}}"
          sensor_id: "{{payload.detect.routing.sid}}"
          detected_at: "{{payload.ts}}"
          rule: "{{payload.source_rule}}"
          mitre_tags: "{{payload.rule_tags}}"
          source: "limacharlie"
      - kind: Device
        label: "{{payload.detect.routing.hostname}}"
        properties:
          sensor_id: "{{payload.detect.routing.sid}}"
          internal_ip: "{{payload.detect.routing.int_ip}}"
          external_ip: "{{payload.detect.routing.ext_ip}}"
          platform: "{{payload.detect.routing.plat}}"
          source: "limacharlie"
    edges:
      - relation: REFERENCES
        from_label: "{{payload.detect_id}}"
        to_kind: Device
        to_label: "{{payload.detect.routing.hostname}}"

# --- Alert routing ---
# Route match uses detect_mtd.level (string).
# Route templates use {{field}} directly (router unpacks payload as kwargs).

routes:
  - match:
      detect_mtd.level: [high, critical]
    target:
      mission: alert-triage
    priority: high
    sla: 15m

  - match:
      detect_mtd.level: [medium]
    target:
      channel: security-findings

# --- MCP tools for agents ---
# Auth handled by egress JWT swap — tools hit api.limacharlie.io which
# matches the jwt-swap.yaml domain config.

mcp:
  name: limacharlie
  credential: limacharlie-api
  api_base: "https://api.limacharlie.io/v1"
  tools:
    - name: get_alert_detail
      method: GET
      path: "/insight/${LC_ORG_ID}/detections/{{detect_id}}"
      description: >
        Get full event detail for a specific LC detection. Returns the
        raw event data including process info, file paths, hashes, and
        command lines. Use after receiving an alert to get investigation
        context.
      parameters:
        detect_id:
          type: string
          required: true
          description: LC detection ID (detect_id field from alert)

    - name: get_sensor_detail
      method: GET
      path: "/{{sensor_id}}"
      description: >
        Get sensor info including hostname, IP addresses, platform,
        enrollment date, and online status. Use to understand the
        device involved in an alert.
      parameters:
        sensor_id:
          type: string
          required: true
          description: LC sensor ID (routing.sid from alert)

    - name: get_sensor_overview
      method: GET
      path: "/insight/${LC_ORG_ID}/{{sensor_id}}/overview?start={{start}}&end={{end}}"
      description: >
        Get sensor activity overview for a time window. Shows event
        type distributions and activity summary. Requires start/end
        unix timestamps.
      parameters:
        sensor_id:
          type: string
          required: true
          description: LC sensor ID
        start:
          type: string
          required: true
          description: Start time (unix seconds)
        end:
          type: string
          required: true
          description: End time (unix seconds)

rate_limits:
  max_per_hour: 100
  max_concurrent: 5
