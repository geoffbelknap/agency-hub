kind: connector
name: agency-bridge-slack-commands-outbound
version: "0.1.0"
description: >
  Relays agent replies posted on the `slack-commands` bridge channel back into
  the invoking Slack channel and thread context when available.
author: geoffbelknap
license: Apache-2.0

requires:
  services:
    - slack

source:
  type: channel-watch
  channel: slack-commands
  pattern: ".*"

routes:
  - match: {}
    relay:
      url: "https://slack.com/api/chat.postMessage"
      method: POST
      headers:
        Authorization: "Bearer ${SLACK_BOT_TOKEN}"
        Content-Type: application/json
      body: >
        {"channel": "{{ metadata.source_payload.channel_id }}",
         "text": "*{{ author }}*: {{ content }}",
         "thread_ts": "{{ metadata.source_payload.thread_ts }}",
         "unfurl_links": false}

rate_limits:
  max_per_hour: 1000
  max_concurrent: 20
