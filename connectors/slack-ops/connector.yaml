kind: connector
name: slack-ops
version: "1.1.0"
description: >
  Polls Slack channels for messages matching trigger patterns and routes
  them to agents. Agents can read threads, post replies, react, and
  search messages. Bidirectional — Slack is both a work source and an
  output channel for agent teams.

  Includes thread reply polling: after each main poll, fetches replies
  for any message with reply_count > 0, so @mentions inside threads are
  also routed. Deduplicates by message ts to prevent reply loops.
author: Agency

requires:
  services:
    - slack

source:
  type: poll
  url: "https://slack.com/api/conversations.history?channel=${SLACK_CHANNEL_ID}&limit=20"
  method: GET
  headers:
    Authorization: "Bearer ${SLACK_BOT_TOKEN}"
    Accept: application/json
  interval: 1m
  response_key: $.messages
  dedup_key: ts
  follow_up:
    url: "https://slack.com/api/conversations.replies?channel=${SLACK_CHANNEL_ID}&ts={ts}"
    when: reply_count
    response_key: $.messages
    dedup_key: ts
    skip_first: true

routes:
  # Route messages that @mention the bot (replace U0YOURBOTUSERID with your bot's Slack user ID)
  - match:
      type: message
      bot_id: null
      subtype: null
      text: "re:<@U0YOURBOTUSERID>"
    target:
      agent: ops-coordinator
    brief: >
      A Slack message mentioning the bot arrived in channel ${SLACK_CHANNEL_ID}.
      From user: {{ user }}
      Message: {{ text }}
      Thread timestamp: {{ ts }}

      Read the message and respond helpfully. Reply in the same thread:
        channel: ${SLACK_CHANNEL_ID}
        thread_ts: {{ ts }}

  # High-priority: urgent/incident language
  - match:
      type: message
      bot_id: null
      subtype: null
      text:
        - "urgent"
        - "incident"
        - "outage"
        - "SEV"
    target:
      agent: ops-coordinator
    brief: >
      Urgent Slack message in channel ${SLACK_CHANNEL_ID}.
      From user: {{ user }}
      Message: {{ text }}
      Thread timestamp: {{ ts }}
    priority: high
    sla: 30m

  # Evaluation/comparison requests
  - match:
      type: message
      bot_id: null
      subtype: null
      text:
        - "evaluate"
        - "assessment"
        - "compare"
    target:
      agent: ops-coordinator
    brief: >
      Evaluation request in Slack channel ${SLACK_CHANNEL_ID}.
      From user: {{ user }}
      Message: {{ text }}
      Thread timestamp: {{ ts }}
    priority: normal

rate_limits:
  max_per_hour: 300
  max_concurrent: 5
