kind: connector
name: slack-interactivity
version: "1.0.0"
description: >
  Receives Slack Interactivity & Shortcuts payloads, verifies signed requests,
  routes human approval clicks through the Agency event bus, and exposes Slack
  modal plus consent-issuer authority tools.
author: geoffbelknap
license: Apache-2.0

requires:
  services:
    - slack
  credentials:
    - name: slack_signing_secret
      description: Slack app signing secret for Interactivity & Shortcuts
      type: secret
      scope: service-grant
    - name: slack_bot_token
      description: Slack bot OAuth token used for modal and approval-card APIs
      type: secret
      scope: service-grant
      setup_url: "https://api.slack.com/apps"
  egress_domains:
    - slack.com
  auth:
    type: bearer

source:
  type: webhook
  path: /webhooks/slack-interactivity
  body_format: form_urlencoded_payload
  ack_strategy: immediate_empty_200
  webhook_auth:
    type: hmac_sha256
    secret_credref: slack_signing_secret
    header: X-Slack-Signature
    timestamp_header: X-Slack-Request-Timestamp
    prefix: "v0="
    max_skew_seconds: 300

config:
  interactivity_target_agent:
    type: string
    required: true
    description: Agent that owns the deployment's Block Kit UX.
  consent_issuer:
    type: bool
    default: false
    description: Enable approval-card tools and token issuance.
  consent_issuer_config:
    type: object
    description: Deployment-scoped consent issuer configuration.

routes:
  - match:
      payload_type: block_actions
      action_id:
        - consent_approve
        - consent_reject
    target:
      runtime_node: slack_interactivity_authority
      runtime_event: approval_action

  - match:
      payload_type: block_actions
    target:
      agent: "${interactivity_target_agent}"
    brief: >
      Slack block action received from {{ user.id }}.
      Action: {{ action_id }}
      Trigger: {{ trigger_id }}

  - match:
      payload_type: view_submission
    target:
      agent: "${interactivity_target_agent}"
    brief: >
      Slack modal submission received from {{ user.id }}.
      Callback: {{ view.callback_id }}

  - match:
      payload_type: shortcut
    target:
      agent: "${interactivity_target_agent}"
    brief: >
      Slack shortcut invoked by {{ user.id }}.
      Callback: {{ callback_id }}

  - match:
      payload_type: message_action
    target:
      agent: "${interactivity_target_agent}"
    brief: >
      Slack message action invoked by {{ user.id }}.
      Callback: {{ callback_id }}

  - match:
      payload_type: view_closed
    target:
      agent: "${interactivity_target_agent}"
    brief: >
      Slack modal closed by {{ user.id }}.
      Callback: {{ view.callback_id }}

tools:
  - name: slack_view_open
    description: Open a Slack modal view from a valid trigger_id.
    input_schema:
      trigger_id:
        type: string
      view:
        type: object
    returns:
      view_id:
        type: string
      view_hash:
        type: string

  - name: slack_view_update
    description: Update an existing Slack modal view.
    input_schema:
      view_id:
        type: string
      view:
        type: object
      view_hash:
        type: string
    returns:
      view_id:
        type: string
      view_hash:
        type: string

  - name: slack_view_push
    description: Push a new Slack modal view onto the stack.
    input_schema:
      trigger_id:
        type: string
      view:
        type: object
    returns:
      view_id:
        type: string
      view_hash:
        type: string

  - name: consent_open_approval_card
    description: Start a human approval flow and post the approval card into Slack.
    requires_config: consent_issuer
    input_schema:
      channel:
        type: string
      operation_kind:
        type: string
      operation_target:
        type: string
      operation_description:
        type: string
      card_blocks:
        type: object
    returns:
      pending_approval_id:
        type: string
      posted_message_ts:
        type: string

  - name: consent_poll_approval
    description: Poll a pending approval and retrieve the token once ready.
    requires_config: consent_issuer
    input_schema:
      pending_approval_id:
        type: string
    returns:
      status:
        type: string
      consent_token:
        type: string
      witnesses_collected:
        type: array
      expires_at:
        type: string

  - name: consent_cancel_approval
    description: Cancel a pending approval that has not yet completed.
    requires_config: consent_issuer
    input_schema:
      pending_approval_id:
        type: string

runtime:
  executor:
    kind: slack_interactivity
    base_url: https://slack.com
    auth:
      type: bearer
      binding: slack_bot_token
    actions:
      slack_view_open:
        method: POST
        path: /api/views.open
        body:
          trigger_id: trigger_id
          view: view
      slack_view_update:
        method: POST
        path: /api/views.update
        body:
          view_id: view_id
          view: view
          hash: view_hash
      slack_view_push:
        method: POST
        path: /api/views.push
        body:
          trigger_id: trigger_id
          view: view
      consent_open_approval_card:
        method: POST
        path: /api/chat.postMessage
      consent_poll_approval:
        method: GET
        path: /local/poll
      consent_cancel_approval:
        method: POST
        path: /api/chat.update

rate_limits:
  max_per_hour: 2000
  max_concurrent: 20
