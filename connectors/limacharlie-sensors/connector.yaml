# LimaCharlie Sensors Connector (companion to main limacharlie connector)
# Polls sensor inventory for device tracking. Writes Device nodes to the
# knowledge graph.
#
# Software artifact collection is available via the get_sensor_artifacts
# MCP tool on the main limacharlie connector — agents call it on demand.
#
# Activate separately: agency connector activate limacharlie-sensors
#
# Auth: JWT exchange handled by egress proxy (jwt-swap.yaml config).

kind: connector
name: limacharlie-sensors
version: 0.2.0
description: >
  LimaCharlie sensor inventory connector. Polls sensor list every 15 minutes
  and writes Device nodes to the knowledge graph with current status, IP
  addresses, platform, and online state.
author: agency-hub
license: MIT

requires:
  credentials:
    - name: LC_API_KEY
      description: LimaCharlie API key (sensor.list scope)
      type: secret
      scope: service-grant
      grant_name: limacharlie-api
      setup_url: "https://app.limacharlie.io/api-keys"
    - name: LC_ORG_ID
      description: LimaCharlie organization ID
      type: config
      scope: env-var
      example: "263c19e9-bd4a-475a-8cd3-5403af446cb9"
  egress_domains:
    - api.limacharlie.io
  services:
    - limacharlie-api

source:
  type: poll
  url: "https://api.limacharlie.io/v1/sensors/${LC_ORG_ID}"
  method: GET
  # No Authorization header — egress JWT swap handles auth
  interval: 15m
  response_key: "$.sensors"
  dedup_key: "sid"

graph_ingest:
  - nodes:
      - kind: Device
        label: "{{payload.hostname}}"
        properties:
          sensor_id: "{{payload.sid}}"
          internal_ip: "{{payload.int_ip}}"
          external_ip: "{{payload.ext_ip}}"
          platform: "{{payload.plat}}"
          is_online: "{{payload.is_online}}"
          last_seen: "{{payload.alive}}"
          enrolled: "{{payload.enroll}}"
          architecture: "{{payload.arch}}"
          source: "limacharlie"

# No routes — sensor inventory is graph-only.

rate_limits:
  max_per_hour: 20
  max_concurrent: 2
