kind: pack
name: slack-ops
version: "1.0.0"
description: >
  Ops team that monitors Slack channels for requests, incidents, and
  evaluation tasks. Agents read threads, investigate, and post findings
  back to Slack. Bidirectional — Slack is both the work source and the
  human communication channel.
author: geoffbelknap
license: Apache-2.0

requires:
  connectors:
    - slack-ops
  services:
    - slack

credentials:
  - name: slack
    description: >
      Slack Bot User OAuth Token (xoxb-...). Create a Slack App with
      scopes: channels:history, channels:read, chat:write, reactions:read,
      reactions:write, users:read, files:read, files:write, search:read
    required: true

team:
  name: slack-ops
  agents:
    - name: ops-coordinator
      preset: coordinator
      role: coordinator
      connectors:
        - slack-ops
      skills: []

    - name: responder
      preset: ops
      role: standard
      connectors:
        - slack-ops
      skills: []

    - name: researcher
      preset: analyst
      role: standard
      connectors:
        - slack-ops
      skills: []

    - name: escalation-monitor
      preset: function
      role: function
      connectors:
        - slack-ops
      skills: []

  channels:
    - name: slack-ops-general
      topic: Team coordination and status updates

    - name: slack-ops-work
      topic: Active work items from Slack

    - name: slack-ops-escalations
      topic: Items requiring human attention
      private: true
