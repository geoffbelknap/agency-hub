kind: pack
name: red-team
version: "1.0.0"
description: >
  Red team coordination pack for authorized security testing. A coordinator
  delegates reconnaissance and exploitation tasks to specialist agents. All
  findings are contributed to the organizational knowledge graph so prior work
  compounds across engagements.
author: Agency

requires:
  presets:
    - coordinator
    - analyst

team:
  name: red-team
  agents:
    - name: red-team-coordinator
      preset: coordinator
      role: coordinator
      connectors: []
      skills: []

    - name: red-team-recon
      preset: analyst
      role: standard
      connectors: []
      skills: []

    - name: red-team-exploit
      preset: analyst
      role: standard
      connectors: []
      skills: []

  channels:
    - name: red-team-ops
      topic: Coordination, task delegation, and status updates

    - name: red-team-findings
      topic: Confirmed vulnerabilities, attack paths, and exploitation results

    - name: red-team-escalations
      topic: Items requiring human decision before proceeding
      private: true

# Optional: activate to surface escalations in Slack in real-time.
# Requires SLACK_BOT_TOKEN and SLACK_ESCALATION_CHANNEL_ID env vars.
# Run: agency connector activate red-team-escalations-to-slack
recommended_connectors:
  - red-team-escalations-to-slack
