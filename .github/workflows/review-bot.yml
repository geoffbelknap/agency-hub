name: Connector Review Bot

on:
  pull_request:
    paths:
      - 'connectors/**'
      - 'packs/**'
      - 'presets/**'
      - 'ontology/**'
      - 'skills/**'

# Minimal permissions — read content, write PR comments/reviews
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    # Do not run on PRs from forks — fork PRs cannot be auto-approved
    # safely since the code hasn't been reviewed yet. Fork contributors
    # must be added as collaborators or their PRs reviewed manually.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      # Pin all actions to full SHA — tag references (v6, v5) can be
      # hijacked if the upstream repo is compromised. SHA pins are
      # immutable. Audit these SHAs against the action's releases page
      # if you need to update them.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run review bot
        id: review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          # Validate BASE_REF is a safe branch name (alphanumeric, dash, slash, dot)
          if ! echo "$BASE_REF" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "ERROR: invalid base_ref: $BASE_REF"
            exit 1
          fi
          python scripts/review_connector.py \
            --base "origin/$BASE_REF" \
            --head "$HEAD_SHA"
        continue-on-error: true

      - name: Handle auto-approve
        if: steps.review.outcome == 'success'
        run: |
          gh pr review "$PR_NUMBER" --approve \
            --body "**Review Bot: AUTO-APPROVED**

          All changes are routine — no security surface changes detected.

          Checks passed:
          - Schema validation
          - Credential scope unchanged
          - Egress domains unchanged
          - MCP tools unchanged
          - Template safety scan"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Handle needs-review
        if: steps.review.outcome == 'failure' && steps.review.outputs.needs_review == 'true'
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "**Review Bot: NEEDS HUMAN REVIEW**

          Security surface changes detected — a maintainer must review.

          See workflow log for details. @geoffbelknap please review."

          gh pr edit "$PR_NUMBER" --add-label "needs-human-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Handle validation failure
        if: steps.review.outcome == 'failure' && steps.review.outputs.needs_review != 'true'
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "**Review Bot: BLOCKED**

          Connector validation failed. Fix the errors and push again.
          See the workflow log for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      # Gate: fail only on validation errors (exit 1). Human-review (exit 2)
      # passes the status check — branch protection's review requirement
      # is the gate for those PRs, not the CI check.
      - name: Gate — block merge on validation failure
        if: steps.review.outcome == 'failure' && steps.review.outputs.needs_review != 'true'
        run: |
          echo "Connector validation failed. Fix errors before merge."
          exit 1
