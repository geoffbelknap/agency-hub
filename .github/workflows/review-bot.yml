name: Connector Review Bot

on:
  pull_request:

# Minimal permissions — read content, write PR comments/reviews
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    # Do not run on PRs from forks — fork PRs cannot be auto-approved
    # safely since the code hasn't been reviewed yet.
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Skip review for PRs that don't touch component files.
      # Always report a status so the required check passes.
      - name: Check for component changes
        id: changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if ! echo "$BASE_REF" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "has_components=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- \
            'connectors/' 'packs/' 'presets/' 'ontology/' 'skills/' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_components=false" >> "$GITHUB_OUTPUT"
            echo "No component changes — skipping review."
          else
            echo "has_components=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed_files<<EOF"
              echo "$CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.changes.outputs.has_components == 'true'
        with:
          python-version: '3.13'

      - name: Install dependencies
        if: steps.changes.outputs.has_components == 'true'
        run: pip install pyyaml

      - name: Check for ASK approval label
        if: steps.changes.outputs.has_components == 'true'
        id: approval
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS_JSON" | grep -q '"ask-approved"'; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
          fi

      # Run review bot and capture exit code (0=auto-approve, 1=blocked, 2=needs-review)
      - name: Run review bot
        if: steps.changes.outputs.has_components == 'true'
        id: review
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if ! echo "$BASE_REF" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "ERROR: invalid base_ref"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          set +e
          python scripts/review_connector.py \
            --base "origin/$BASE_REF" \
            --head "$HEAD_SHA"
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "ask_outcome=ASK-Pass" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "ask_outcome=ASK-Fail" >> "$GITHUB_OUTPUT"
          else
            echo "ask_outcome=ASK-Partial" >> "$GITHUB_OUTPUT"
          fi

      - name: Write assurance summary
        if: steps.changes.outputs.has_components == 'true'
        env:
          CHANGED_FILES: ${{ steps.changes.outputs.changed_files }}
          ASK_OUTCOME: ${{ steps.review.outputs.ask_outcome }}
        run: |
          args=()
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            args+=(--component-file "$file")
          done <<< "$CHANGED_FILES"
          python3 scripts/write_assurance.py \
            "${args[@]}" \
            --result "$ASK_OUTCOME" \
            --review-scope package-change \
            --reviewer-type automated \
            --assurance-dir assurance-statements \
            --output assurance-summary.json

      - name: Upload assurance summary
        if: steps.changes.outputs.has_components == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: assurance-summary
          path: |
            assurance-summary.json
            assurance-statements/

      # Exit 0: routine changes, auto-approve
      - name: Auto-approve
        if: steps.review.outputs.exit_code == '0'
        run: |
          gh pr review "$PR_NUMBER" --approve \
            --body "**Review Bot: AUTO-APPROVED**

          All changes are routine — no security surface changes detected.

          Checks passed:
          - Schema validation
          - Credential scope unchanged
          - Egress domains unchanged
          - MCP tools unchanged
          - Template safety scan"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      # Exit 2: security surface changed, needs human review
      - name: Flag for human review
        if: steps.review.outputs.exit_code == '2' && steps.approval.outputs.approved != 'true'
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "**Review Bot: NEEDS HUMAN REVIEW**

          Security surface changes detected — review the workflow log
          for details before merging.

          @geoffbelknap"

          gh pr edit "$PR_NUMBER" --add-label "needs-human-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Human review acknowledged
        if: steps.review.outputs.exit_code == '2' && steps.approval.outputs.approved == 'true'
        run: echo "ASK human approval already recorded via ask-approved label"

      # Exit 1: validation failure, block merge
      - name: Block on validation failure
        if: steps.review.outputs.exit_code == '1'
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "**Review Bot: BLOCKED**

          Connector validation failed. Fix the errors and push again.
          See the workflow log for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      # GATE: validation failures and security-surface changes both block merge
      # until a human completes review outside the bot.
      - name: Status check gate
        if: steps.review.outputs.exit_code == '1' || (steps.review.outputs.exit_code == '2' && steps.approval.outputs.approved != 'true')
        env:
          EXIT_CODE: ${{ steps.review.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" = "1" ]; then
            echo "::error::Schema validation failed — fix errors before merging"
          else
            echo "::error::ASK review requires human approval before merging"
          fi
          exit 1
