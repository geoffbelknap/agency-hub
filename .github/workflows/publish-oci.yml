name: Publish OCI Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'connectors/**'
      - 'packs/**'
      - 'presets/**'
      - 'missions/**'
      - 'skills/**'
      - 'services/**'
      - 'providers/**'
      - 'ontology/**'
      - 'setup/**'
      - 'policies/**'
      - 'workspaces/**'
      - 'pricing/**'
      - 'scripts/build_oci_index.py'

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io/geoffbelknap/agency-hub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install ORAS
        run: |
          ORAS_VERSION="1.2.0"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          sudo mv oras /usr/local/bin/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build OCI catalog index
        run: python3 scripts/build_oci_index.py --registry "${{ env.REGISTRY }}"

      - name: Publish components
        run: |
          while IFS=$'\t' read -r KIND NAME VERSION REF COMPONENT_FILE METADATA_FILE MEDIA_TYPE; do
            [ -z "$KIND" ] && continue

            echo "Publishing ${KIND}/${NAME}:${VERSION} (${COMPONENT_FILE})..."

            if [ -z "$MEDIA_TYPE" ]; then
              MEDIA_TYPE="application/vnd.agency.hub.component.v1+yaml"
            fi

            PUSH_ARGS=(
              "$COMPONENT_FILE:$MEDIA_TYPE"
            )
            if [ -n "$METADATA_FILE" ] && [ -f "$METADATA_FILE" ]; then
              PUSH_ARGS+=("$METADATA_FILE:application/vnd.agency.hub.metadata.v1+yaml")
            fi

            oras push "$REF" \
              --annotation "org.opencontainers.image.version=$VERSION" \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
              --annotation "agency.hub.kind=$KIND" \
              "${PUSH_ARGS[@]}"

            oras tag "$REF" latest

            cosign sign --yes "$REF"

            echo "Published and signed ${KIND}/${NAME}:${VERSION}"
          done < oci-publish-list.tsv

      - name: Publish catalog index
        run: |
          REF="${{ env.REGISTRY }}/index/catalog:${{ github.sha }}"
          oras push "$REF" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
            --annotation "agency.hub.kind=index" \
            "oci-index.yaml:application/vnd.agency.hub.index.v1+yaml"

          oras tag "$REF" latest

          cosign sign --yes "$REF"

          echo "Published and signed catalog index"

      - name: Summary
        run: echo "### OCI artifacts published to ghcr.io" >> "$GITHUB_STEP_SUMMARY"
