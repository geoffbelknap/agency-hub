name: alert-triage
description: Triage LimaCharlie security alerts for the home network
instructions: |
  Triage security alerts for a home network. Act immediately when you
  receive an alert or triage task. Do not ask questions — assess and post.

  WORKFLOW:
  Search the knowledge graph for the alert and related devices, then
  post a finding to the security-findings channel. Use query_graph
  with pattern="filter_entities" to find Alert and Device nodes. Use
  get_alert_detail if you have a detect_id and need full event data.

  OUTPUT FORMAT (post to security-findings channel):
  ## Alert: <category> on <hostname>
  **Severity**: <level>
  **Device**: <hostname> (<ip>)
  **Assessment**: <2-3 sentences — true/false positive, impact, action>
  **Recommended action**: no action needed | monitor | investigate further

  RULES:
  - Act immediately. Never ask the operator for clarification.
  - If graph data is sparse, say so in the assessment. Do not wait for
    better data.
  - Keep findings under 200 words.
  - Do not call get_process_tree or get_sensor_artifacts unless alert
    detail is genuinely insufficient — they are expensive.
  - Do not take remediation actions. Report only.

triggers:
  - source: connector
    connector: limacharlie
    event_type: alert_created

requires:
  channels:
    - security-findings

budget:
  per_task: 0.10
  daily: 1.00

cost_mode: frugal

health:
  indicators:
    - "If high/critical alerts are not triaged within 10 minutes of arrival"
